<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Mouse and Melts Bakery | Islamabad</title>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css'>

    <style>
        body {margin: 0; font-family: 'Inter', sans-serif;}
        nav {position: fixed; top: 0; width: 100%; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); display: flex; justify-content: space-between; padding: 1rem 2rem; z-index: 1000;}

        .cta {margin-top: 1rem;}
        .cta a {margin: 0.5rem; padding: 0.75rem 1.5rem; background: #8B1A1A; color: white; text-decoration: none; border-radius: 5px; transition: background 0.3s ease;}
        .cta a:hover {background: #D4A017;}

</head>
<body>
    <nav>
        <div class='logo'><a href='#'>Mouse and Melts Bakery</a></div>

    </nav>
    <section class='hero'>
        <h1>Mouse and Melts</h1>

        <div class='cta'>
            <a href='#about'>Our Story</a>

    </section>
    <section id='about' data-aos='fade-up'>
        <!-- About Section HTML -->
    </section>
    <section id='services' data-aos='fade-up'>
        <!-- Delights Section HTML -->
    </section>
    <section id='contact' data-aos='fade-up'>
        <!-- Contact Section HTML -->
    </section>
    <script src='https://unpkg.com/aos@2.3.1/dist/aos.js'></script>
    <script>AOS.init();</script>

</html>
